name: Check Event Coverage Audit
permissions:
  contents: read

on:
  workflow_call:

jobs:
  event-coverage:
    name: Event Coverage Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      FLASK_APP: 'backend:create_app'
      FLASK_DEBUG: 'false'
      PRODUCTION: 'false'
      SECRET_KEY: 'ABCDEFGH12345678'
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: 'postgres'
      POSTGRES_DB: 'postgres'
      MAILJET_API_KEY: 'dummy-not-used'
      MAILJET_SECRET_KEY: 'dummy-not-used'
      BASE_EMAIL: 'noreply@example.com'
      METRICS_ENABLED: 'false'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: '3.11.9'
          cache: 'pip'
          cache-dependency-path: '**/requirements/requirements-test.txt'

      - name: Install Python dependencies
        run: |
          python3.11 -m pip install --upgrade pip
          pip install -r requirements/requirements-test.txt

      - name: Run event coverage audit
        run: |
          if ! flask metrics audit --strict; then
            echo "::error::Event coverage audit failed. Run 'make audit' locally and reconcile the gaps. See plans/anonymous-metrics/research/event-coverage-audit.md for the catalog."
            exit 1
          fi

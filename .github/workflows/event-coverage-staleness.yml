name: Check Event Coverage Audit
permissions:
  contents: read

on:
  workflow_call:

jobs:
  event-coverage:
    name: Event Coverage Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      FLASK_APP: 'backend:create_app'
      FLASK_DEBUG: 'false'
      PRODUCTION: 'false'
      SECRET_KEY: 'ABCDEFGH12345678'
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: 'postgres'
      POSTGRES_DB: 'postgres'
      MAILJET_API_KEY: 'dummy-not-used'
      MAILJET_SECRET_KEY: 'dummy-not-used'
      BASE_EMAIL: 'noreply@example.com'
      METRICS_ENABLED: 'false'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: '3.11.9'
          cache: 'pip'
          cache-dependency-path: '**/requirements/requirements-test.txt'

      - name: Install Python dependencies
        run: |
          python3.11 -m pip install --upgrade pip
          pip install -r requirements/requirements-test.txt

      - name: Run event coverage audit
        run: |
          if ! flask metrics audit --strict; then
            echo "::error::Event coverage audit failed. Run 'make audit' locally and reconcile drift between backend/metrics/event_registry.py and the EventName enum / DIMENSION_MODELS."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate metrics-flows.ts
        run: flask metrics generate-flows --output frontend/types/metrics-flows.ts

      - name: Format metrics-flows.ts with prettier
        working-directory: frontend
        run: npx prettier --write types/metrics-flows.ts

      - name: Check metrics-flows.ts is not stale
        run: |
          if ! git diff --exit-code frontend/types/metrics-flows.ts; then
            echo "::error::frontend/types/metrics-flows.ts is stale. Run 'make generate-types' and commit the updated file."
            exit 1
          fi

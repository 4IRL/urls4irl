name: Build production docker images
permissions:
  contents: read
  packages: write

on:
  workflow_call:

env:
  # Name of docker image
  IMAGE_NAME: u4i-prod
  WORKFLOW_IMAGE_NAME: u4i-workflow

jobs:
    ProdBuild:
        name: Build flask production docker image and workflow image
        runs-on: ubuntu-latest

        strategy:
          fail-fast: false
          matrix:
            include:
              - image_name: u4i-prod
                dockerfile: docker/Dockerfile
              - image_name: u4i-workflow
                dockerfile: docker/Dockerfile.Workflow

        steps:
        - name: Checkout
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          with:
            ref: main
            persist-credentials: false

        - name: Log in to GHCR
          uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Extract metadata (tags, labels)
          id: meta
          uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
          with:
            images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
            tags: |
              type=raw,value=latest,enable={{is_default_branch}}
              type=ref,event=branch
              type=ref,event=tag
              type=sha,format=short,prefix={{date 'YYYYMMDD'}}-

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

        - name: Build and Push
          uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
          with:
            context: .
            file: ${{ matrix.dockerfile }}
            push: true
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}
            cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}:buildcache
            cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}:buildcache,mode=max


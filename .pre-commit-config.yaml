repos:
  - repo: https://github.com/psf/black-pre-commit-mirror    
    rev: 26.1.0
    hooks:
    - id: black
      language_version: python3.11

  - repo: https://github.com/pycqa/flake8
    rev: "7.1.2"
    hooks:
    - id: flake8
      args: [--extend-ignore, "E501,E203"]
      
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: "v4.0.0-alpha.8"
    hooks:
    - id: prettier
      types_or: [javascript, ts]
      exclude: ^(backend/static/dist/|backend/static/vendor/|frontend/public/vendor/)

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: "v9.21.0"
    hooks:
    - id: eslint
      name: eslint (js)
      args: [--no-config-lookup]
      types: [javascript]
    - id: eslint
      name: eslint (ts)
      args: [--config, frontend/eslint.config.js]
      types: [ts]
      additional_dependencies:
        - eslint@9.39.4
        - "@typescript-eslint/parser@8.58.1"
        - "@typescript-eslint/eslint-plugin@8.58.1"

  - repo: local
    hooks:
    - id: tsc-typecheck
      name: TypeScript typecheck
      entry: docker compose --project-directory . -f docker/compose.local.yaml exec -T vite npx tsc --noEmit --project frontend/tsconfig.json
      language: system
      types: [ts]
      pass_filenames: false

{% extends "admin/base.html" %}
{% set active_nav = 'health' %}
{% block admin_content %}
<header id="AdminHealthHeader" class="admin-page-header">
    <h1 id="AdminHealthTitle">{{ ADMIN_PORTAL_STRINGS.HEALTH_TITLE }}</h1>
</header>
<div id="AdminHealthSnapshot"
     hx-get="{{ url_for('admin.admin_health_snapshot') }}"
     hx-trigger="load, refresh-health"
     hx-swap="innerHTML"
     aria-live="polite">
</div>
{% endblock %}

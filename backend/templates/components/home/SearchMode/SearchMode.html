<div id="crossUtubSearchMode" class="cross-search-hidden" role="search" aria-label="Search across all your UTubs">
    <div id="crossUtubSearchHeader">
        <input id="crossUtubSearchInput" type="search" aria-label="Search across all your UTubs" tabindex="0">
        <button id="crossUtubSearchClose" aria-label="Close search">&times;</button>
    </div>
    <div id="crossUtubSearchFields">
        <p id="crossUtubSearchFieldsLabel">
            <span class="crossSearchFieldsTitle">Search in these fields</span>
            <span class="crossSearchFieldsHint">Uncheck a field to skip it · use ▲▼ to set which is matched first</span>
        </p>
        <div id="crossUtubSearchFieldControls"></div>
    </div>
    <span id="crossUtubSearchAnnouncement" class="visually-hidden" aria-live="polite"></span>
    <div id="crossUtubSearchResults"></div>
    <p id="crossUtubSearchNoResults" class="hidden"></p>
    <p id="crossUtubSearchShortQuery" class="hidden"></p>
</div>

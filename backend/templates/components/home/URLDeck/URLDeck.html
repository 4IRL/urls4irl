<div id="URLDeck" class="deck h-100 flex-column align-stretch">
	<div class="flex-column" id="URLDeckHeaderWrap">
		<!-- Header -->
		{% include 'components/home/URLDeck/URLDeckHeader.html' %}

		<!-- Subheader -->
		{% include 'components/home/URLDeck/URLDeckSubheader.html' %}
	</div>

	<!-- URLs -->
	<div class="flex-column content">
		<!-- URLs above selected URL will be displayed here -->
		<div id="noURLsEmptyState" class="hidden">
			<p id="noURLsSubheader"></p>
			<div id="urlBtnDeckCreateWrap" class="flex-column align-center">
				<button id="urlBtnDeckCreate" class="btn btn-success btn-sm">Add URL</button>
			</div>
		</div>

		<p id="URLSearchNoResults" class="hidden"></p>
		<p id="URLTagFilterNoResults" class="hidden"></p>
		<div id="listURLs">
			<h5 class="flex-row justify-center" id="URLDeckErrorIndicator" tabindex="-1"></h5>
			<!-- Create URL Form -->
			{% include 'components/home/URLDeck/CreateURLForm.html' %}
			<!-- All URLs otherwise go here -->
		</div>
	</div>

	<!-- Mobile peeking handle to open the Tag filter bottom sheet (mobile-only; shown by JS) -->
	<button id="tagSheetHandle" class="tag-sheet-handle hidden" type="button" aria-expanded="false"
		aria-controls="tagDeckSheet" aria-label="Filter URLs by tag">
		<span class="tag-sheet-handle-grabber" aria-hidden="true"></span>
		<svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" height="20" width="20" viewBox="0 0 16 16"
			aria-hidden="true">
			<path
				d="M1.5 1.5A.5.5 0 0 1 2 1h12a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-.128.334L10 8.692V13.5a.5.5 0 0 1-.342.474l-3 1A.5.5 0 0 1 6 14.5V8.692L1.628 3.834A.5.5 0 0 1 1.5 3.5z" />
		</svg>
		<span class="tag-sheet-handle-label">Filter by tag</span>
		<span id="tagSheetHandleCount" class="tag-sheet-handle-count hidden" aria-live="polite"></span>
	</button>
</div>

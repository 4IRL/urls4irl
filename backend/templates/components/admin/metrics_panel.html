<div class="content-row">
    <div class="panel">
        <h2>Top events</h2>
        <div class="top-filters">
            <span class="top-filter-group">
                <label for="MetricsTopResourceFilter-{{ category }}">Resource:</label>
                <select id="MetricsTopResourceFilter-{{ category }}"
                        class="MetricsTopResourceFilter"
                        data-category="{{ category }}"
                        aria-label="Filter top events by resource"></select>
            </span>
            <span class="top-filter-group">
                <label for="MetricsTopDeviceFilter-{{ category }}">{{ CONSTANTS.STRINGS.METRICS_TOP_DEVICE_LABEL }}</label>
                <select id="MetricsTopDeviceFilter-{{ category }}"
                        class="MetricsTopDeviceFilter"
                        data-category="{{ category }}"
                        aria-label="Filter top events by device type"></select>
            </span>
            <span class="top-filter-group top-filter-group--search">
                <label for="MetricsTopSubstringFilter-{{ category }}">Search:</label>
                <input type="search"
                       id="MetricsTopSubstringFilter-{{ category }}"
                       class="MetricsTopSubstringFilter"
                       data-category="{{ category }}"
                       placeholder="Filter by name…"
                       aria-label="Filter top events by name substring">
            </span>
        </div>
        <table id="{{ table_id }}" class="top-table" aria-label="Top events">
            <thead></thead>
            <tbody></tbody>
        </table>
    </div>
    <div class="content-row__resizer"
         role="separator"
         aria-orientation="vertical"
         aria-controls="{{ table_id }} {{ chart_id }}"
         aria-label="Resize top events and timeseries panes"
         aria-valuemin="25"
         aria-valuemax="75"
         tabindex="0"></div>
    <div class="panel">
        <h2>Timeseries</h2>
        <div class="ts-controls">
            <label for="{{ select_id }}">Series:</label>
            <select id="{{ select_id }}" class="MetricsTimeseriesEventSelect" aria-label="{{ CONFIG.strings.METRICS_TIMESERIES_SELECT_ARIA }}"></select>
        </div>
        <svg id="{{ chart_id }}" class="MetricsChart" viewBox="0 0 800 240" preserveAspectRatio="xMinYMid meet"
             role="img" aria-labelledby="{{ chart_id }}-title" aria-describedby="{{ chart_id }}-desc">
            <title id="{{ chart_id }}-title"></title>
            <desc id="{{ chart_id }}-desc"></desc>
        </svg>
    </div>
</div>

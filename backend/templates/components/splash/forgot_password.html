<form id="ModalForm" method="POST" class="login-register-form" action="" novalidate>
    <div class="modal-header">
        <h4 class="modal-title">{{ CONSTANTS.STRINGS.FORGOT_YOUR_PASSWORD }}</h4>
        <button type="button" class="btn-close close-modal" data-bs-dismiss="modal" aria-label="close">
        </button>
    </div>
    <div class="modal-body">
        <p id="ForgotPasswordText">Enter the email associated with your account. An email will be sent to reset your
            password.</p>
        <fieldset class="form-group">
            <div class="form-group forgot-password-form-group">
                <label class="form-control-label forgot-password-email-label" for="email">Email</label>
                <input class="form-control login-register-form-group" id="email" name="email" type="email"
                    autocomplete="email" required>
            </div>
        </fieldset>
        <div id="SplashModalAlertBanner" class="alert alert-banner-splash-modal-hide" role="alert"></div>
    </div>
    <div class="modal-footer">
        <button id="submit" class="btn btn-success login-register-form-group login-register-buttons center-block col-7 mr-4"
            type="submit">Send Password Reset Email</button>
        <a id="ToLoginFromForgotPassword" class="btn btn-secondary col-4 login-register-form-group center-block"
            href="#">Back to Login</a>
    </div>
</form>

<form id="ModalForm" method="POST" class="login-register-form" action="/register" novalidate>
    <div class="modal-header">
        <h4 class="modal-title">Register</h4>
        <button type="button" class="btn-close close-register-login-modal" data-bs-dismiss="modal" aria-label="close">
        </button>
    </div>
    <div class="modal-body">
        <div id="SplashModalAlertBanner" class="alert alert-banner-splash-modal-hide" role="alert"></div>
        <fieldset class="form-group">
            <div class="form-group first-in-register-login-form">
                <label class="form-control-label login-register-label" for="username">Username</label>
                <input autocomplete="username" class="form-control login-register-form-group" id="username" maxlength="{{CONSTANTS.USERS.MAX_USERNAME_LENGTH}}" minlength="{{CONSTANTS.USERS.MIN_USERNAME_LENGTH}}" name="username" required type="text" value="">
            </div>
            <div class="form-group">
                <label class="form-control-label login-register-label" for="email">Email</label>
                <input autocomplete="email" class="form-control login-register-form-group" id="email" name="email" required type="email" value="">
            </div>
            <div class="form-group">
                <label class="form-control-label login-register-label" for="confirmEmail">Confirm Email</label>
                <input autocomplete="email" class="form-control login-register-form-group" id="confirmEmail" name="confirmEmail" required type="email" value="">
            </div>
            <div class="form-group">
                <label class="form-control-label login-register-label" for="password">Password</label>
                <input autocomplete="new-password" class="form-control login-register-form-group" id="password" maxlength="{{CONSTANTS.USERS.MAX_PASSWORD_LENGTH}}" minlength="{{CONSTANTS.USERS.MIN_PASSWORD_LENGTH}}" name="password" required type="password" value="">
            </div>
            <div class="form-group">
                <label class="form-control-label login-register-label" for="confirmPassword">Confirm Password</label>
                <input autocomplete="new-password" class="form-control login-register-form-group" id="confirmPassword" name="confirmPassword" required type="password" value="">
            </div>
        </fieldset>
    </div>
    <div class="modal-footer register-login-modal-footer">
        <button id="submit" class="btn btn-success login-register-form-group col-12 login-register-buttons" type="submit">Register</button>
    </div>
</form>
<div class="d-flex justify-content-center register-to-login-footer">
    <div class="border-top pb-3">
        <small class="text-muted">
            <a class="splash-page-links" id="ToLoginFromRegister" href="#">Already a user? Login</a>
        </small>
    </div>
</div>

<form id="ModalForm" method="POST" class="login-register-form" action="/login" novalidate>
    <div class="modal-header">
        <h4 class="modal-title">{{CONSTANTS.STRINGS.LOGIN_TITLE}}</h4>
        <button type="button" class="btn-close close-register-login-modal" data-bs-dismiss="modal" aria-label="close">
        </button>
    </div>
    <div class="modal-body">
        <div id="SplashModalAlertBanner" class="alert alert-banner-splash-modal-hide" role="alert"></div>
        <fieldset class="form-group">
            <div class="form-group first-in-register-login-form">
                <label class="form-control-label login-register-label" for="username">Username</label>
                <input autocomplete="username" class="form-control login-register-form-group" id="username" maxlength="{{CONSTANTS.USERS.MAX_USERNAME_LENGTH}}" minlength="{{CONSTANTS.USERS.MIN_USERNAME_LENGTH}}" name="username" required type="text" value="">
            </div>
            <div class="form-group">
                <label class="form-control-label login-register-label" for="password">Password</label>
                <input autocomplete="current-password" class="form-control login-register-form-group" id="password" name="password" required type="password" value="">
            </div>
            <div class="form-group" id="ForgotPasswordLink">
                <small class="text-muted">
                    <a class="splash-page-links to-forgot-password" href="#">{{CONSTANTS.STRINGS.FORGOT_YOUR_PASSWORD}}</a>
                </small>
            </div>
        </fieldset>
    </div>
    <div class="modal-footer register-login-modal-footer">
        <button id="submit" class="btn btn-success login-register-form-group login-register-buttons center-block col-4 mr-4" type="submit">Login</button>
        <a id="ToRegisterFromLogin" class="btn btn-secondary col-7 login-register-form-group center-block"
            href="#">Register</a>
    </div>
</form>

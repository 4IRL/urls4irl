name: u4i-prod

services:
  web:
    image: ghcr.io/4irl/u4i-prod:latest
    container_name: u4i-prod-flask
    restart: unless-stopped
    ports:
      - "127.0.0.1:8659:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PRODUCTION=true
      - FLASK_DEBUG=false
      # Anonymous metrics knobs (Phase 2: Redis-backed writer active; domain hooks land in Phase 3)
      # METRICS_REDIS_URI is assembled in backend/config.py from the
      # REDIS_PASSWORD secret; do not set it here in prod.
      - METRICS_ENABLED=false
      - METRICS_FLUSH_INTERVAL_SECONDS=60
      - METRICS_BUCKET_SECONDS=3600
      - METRICS_BATCH_NONCE_TTL_SECONDS=120
    secrets:
      - MAILJET_API_KEY
      - MAILJET_SECRET_KEY
      - BASE_EMAIL
      - SECRET_KEY
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - REDIS_PASSWORD
      - NOTIFICATION_URL
      - CONTACT_US_URL
    volumes:
      - app_logs:/app/volume

  db:
    image: postgres:16.3-bookworm
    container_name: u4i-prod-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB_FILE=/run/secrets/POSTGRES_DB
      - POSTGRES_USER_FILE=/run/secrets/POSTGRES_USER
      - POSTGRES_PASSWORD_FILE=/run/secrets/POSTGRES_PASSWORD
      - POSTGRES_HOST_AUTH_METHOD=scram-sha-256
      - POSTGRES_INITDB_ARGS=--auth=scram-sha-256
    secrets:
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U $(cat /run/secrets/POSTGRES_USER) -d $(cat /run/secrets/POSTGRES_DB)"]
        interval: 5s
        timeout: 5s
        retries: 5

  redis:
    image: redis:6.2
    container_name: u4i-prod-redis
    restart: unless-stopped
    secrets:
      - REDIS_PASSWORD
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    # `--databases 32` is intentionally omitted in production. Production
    # only uses DB 0 (sessions/limiter) and DB 2 (metrics — see the
    # METRICS_REDIS_URI assembled in backend/config.py and
    # docker/startup-workflow.sh from the REDIS_PASSWORD secret), so the
    # default 16-database limit is sufficient. `compose.local.yaml` and
    # `compose.dev.yaml` pass `--databases 32` as a forward-compatibility
    # buffer, but CI's default-16 Redis is already sufficient because the test
    # conftest assigns per-worker metrics DB indices starting at 8 (see
    # `_METRICS_REDIS_DB_BASE` in `tests/conftest.py`), which fits within the
    # default 16-database limit (indices 0-15).
    command: >
      /bin/sh -c "redis-server --appendonly yes --requirepass $(cat /run/secrets/REDIS_PASSWORD)"

  workflow:
    container_name: u4i-prod-workflow
    image: ghcr.io/4irl/u4i-workflow:latest
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    secrets:
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - REDIS_PASSWORD
      - NOTIFICATION_URL
      - ACCESS_KEY
      - SECRET_ACCESS_KEY
      - R2_ENDPOINT
    environment:
      - PRODUCTION=true
      - DEV_SERVER=false
      # METRICS_REDIS_URI is assembled in startup-workflow.sh from the
      # REDIS_PASSWORD secret; do not set it here in prod.
      - METRICS_BUCKET_SECONDS=3600
      - METRICS_FLUSH_LIVENESS_THRESHOLD_SECONDS=180
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    volumes:
      - app_logs:/app/volume
      - pgdata:/var/lib/postgresql/data:ro
      - workflow_logs:/app/workflow_logs
      - backups:/backups
    healthcheck:
      test: ["CMD", "/opt/metrics-venv/bin/python", "/app/check_flush_liveness.py"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 200s

secrets:
  POSTGRES_DB:
    file: ./secrets/POSTGRES_DB
  POSTGRES_USER:
    file: ./secrets/POSTGRES_USER
  POSTGRES_PASSWORD:
    file: ./secrets/POSTGRES_PASSWORD
  MAILJET_API_KEY:
    file: ./secrets/MAILJET_API_KEY
  MAILJET_SECRET_KEY:
    file: ./secrets/MAILJET_SECRET_KEY
  BASE_EMAIL:
    file: ./secrets/BASE_EMAIL
  REDIS_PASSWORD:
    file: ./secrets/REDIS_PASSWORD
  SECRET_KEY:
    file: ./secrets/SECRET_KEY
  NOTIFICATION_URL:
    file: ./secrets/NOTIFICATION_URL
  CONTACT_US_URL:
    file: ./secrets/CONTACT_US_URL
  ACCESS_KEY:
    file: ./secrets/ACCESS_KEY
  SECRET_ACCESS_KEY:
    file: ./secrets/SECRET_ACCESS_KEY
  R2_ENDPOINT:
    file: ./secrets/R2_ENDPOINT

volumes:
  pgdata:
  redisdata:
  app_logs:
  workflow_logs:
  backups:


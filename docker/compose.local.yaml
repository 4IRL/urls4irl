name: u4i-local

services:
  web:
    container_name: u4i-local-web
    stdin_open: true
    tty: true
    build:
      context: .
      dockerfile: docker/Dockerfile.Local
    ports:
      - "8659:5000"
    user: u4i-host:u4i-host-group
    depends_on:
      db:
        condition: service_healthy
      test-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PRODUCTION=false
      - REDIS_URI=redis://redis:6379/0
      - TEST_REDIS_URI=redis://redis:6379/1
      - FLASK_DEBUG=true
      - FLASK_ENV=development
      - BASE_EMAIL=u4i@urls4irl.app
      - DOCKER=true
      - SELENIUM_URL=http://selenium:4444/wd/hub
      - VITE_DEV_SERVER=true
      - VITE_URL=http://localhost:5173
      - VITE_INTERNAL_HOST=vite
      - ENABLE_SSL=false
      # Anonymous metrics knobs. METRICS_ENABLED defaults off locally so unrelated
      # dev work doesn't write counters; flip via `METRICS_ENABLED=true make up d=1`
      # to exercise the live pipeline (see `make metrics-*` targets).
      - METRICS_ENABLED=${METRICS_ENABLED:-false}
      - METRICS_FLUSH_INTERVAL_SECONDS=60
      - METRICS_BUCKET_SECONDS=3600
      - METRICS_REDIS_URI=redis://redis:6379/2
      - METRICS_BATCH_NONCE_TTL_SECONDS=120
    volumes:
      - ./run.py:/code/u4i/run.py
      - ./pytest.ini:/code/u4i/pytest.ini
      - ./backend:/code/u4i/backend
      - ./tests:/code/u4i/tests
      - ./migrations:/code/u4i/migrations
      - ./migrations/versions:/code/u4i/migrations/versions
      - ./scripts:/code/u4i/scripts
      - ./frontend/types:/code/u4i/frontend/types
      - app_logs:/app/volume

  vite:
    container_name: u4i-local-vite
    build:
      context: .
      dockerfile: docker/Dockerfile.Vite
    ports:
      - "5173:5173"
    networks:
      default:
        aliases:
          - localhost
    environment:
      - NODE_ENV=development
      - ENABLE_SSL=false
      - DOCKER=true
    volumes:
      - ./frontend:/app/frontend
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
      - /app/node_modules
      - ./backend/static/dist:/app/backend/static/dist
    command: npm run dev
    healthcheck:
      test: |
        if [ "$${ENABLE_SSL:-false}" = "true" ]; then
          curl -f -k https://localhost:5173/@vite/client
        else
          curl -f http://localhost:5173/@vite/client
        fi
      interval: 10s
      timeout: 5s
      retries: 3

  selenium:
    image: selenium/standalone-chromium:latest
    container_name: u4i-selenium
    depends_on:
      web:
        condition: service_healthy
      vite:
        condition: service_started
    environment:
      - START_XVFB=false
      - SE_NODE_MAX_SESSIONS=12
      - JAVA_OPTS=-XX:ActiveProcessorCount=12
      - SE_NODE_OVERRIDE_MAX_SESSIONS=12
    ports:
      - "4444:4444"
    volumes:
      - /dev/shm:/dev/shm

  workflow:
    container_name: u4i-local-workflow
    build:
      context: .
      dockerfile: docker/Dockerfile.Workflow
    env_file:
      - .env
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PRODUCTION=false
      - DEV_SERVER=false
      - METRICS_REDIS_URI=redis://redis:6379/2
      - METRICS_BUCKET_SECONDS=3600
      - METRICS_FLUSH_LIVENESS_THRESHOLD_SECONDS=180
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    volumes:
      - app_logs:/app/volume
      - pgdata:/var/lib/postgresql/data:ro
      - workflow_logs:/app/workflow_logs
      - backups:/backups
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/metrics-venv/bin/python", "/app/check_flush_liveness.py"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 200s

  db:
    image: postgres:16.3-bookworm
    container_name: u4i-local-postgres
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
        interval: 5s
        timeout: 5s
        retries: 5

  test-db:
    image: postgres:16.3-bookworm
    container_name: u4i-local-postgres-test
    command: postgres -c max_connections=500
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_TEST_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_TEST_DB\""]
        interval: 5s
        timeout: 5s
        retries: 5

  redis:
    image: redis:6.2
    container_name: u4i-local-redis
    command: redis-server --databases 32
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis-metrics:
    image: redis:6.2
    container_name: u4i-local-redis-metrics
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save '' --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  redisdata:
  app_logs:
  workflow_logs:
  backups:


